<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a141d" />
  <meta name="robots" content="noindex" />
  <title>Sayfa bulunamadı · Zafer Balıkçılık Artur</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23c9a36b'/%3E%3Ctext x='50%25' y='62%25' text-anchor='middle' font-size='38' font-family='Georgia' fill='%230a141d' font-weight='900' font-style='italic'%3EZ%3C/text%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,800;0,9..144,900;1,9..144,600;1,9..144,800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <style>
    body.nf {
      background: var(--ink-deep);
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--paper);
      padding: 40px 24px;
      overflow: hidden;
      position: relative;
    }
    .nf-bg {
      position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(circle at 80% 10%, rgba(201,163,107,.16), transparent 45%),
        radial-gradient(circle at 10% 90%, rgba(44,74,58,.22), transparent 45%);
    }
    .nf-card {
      position: relative; z-index: 1;
      max-width: 720px;
      text-align: center;
    }
    .nf-num {
      font-family: var(--display);
      font-weight: 900;
      font-style: italic;
      font-size: clamp(8rem, 22vw, 18rem);
      line-height: .9;
      letter-spacing: -.05em;
      color: var(--paper);
      margin: 0 0 6px;
      position: relative;
      display: inline-block;
    }
    .nf-num::before {
      content: '404';
      position: absolute;
      inset: 0;
      -webkit-text-stroke: 2px var(--gold);
      color: transparent;
      transform: translate(8px, 8px);
      z-index: -1;
      opacity: .5;
    }
    .nf-tag {
      font-size: .72rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--gold-2);
      margin-bottom: 16px;
    }
    .nf-card h1 {
      font-family: var(--display);
      font-weight: 800;
      font-size: clamp(2rem, 4vw, 3rem);
      color: var(--paper);
      margin: 0 0 18px;
      letter-spacing: -.02em;
    }
    .nf-card h1 em { color: var(--gold-2); font-style: italic; }
    .nf-card p {
      color: rgba(246,239,225,.78);
      font-size: 1.02rem;
      margin: 0 auto 36px;
      max-width: 460px;
      line-height: 1.6;
    }
    .nf-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .nf-actions .btn-line { color: var(--paper); border-color: rgba(246,239,225,.4); }
    .nf-actions .btn-line:hover { background: var(--paper); color: var(--ink); }
    .nf-foot {
      margin-top: 60px;
      padding-top: 28px;
      border-top: 1px solid rgba(246,239,225,.12);
      color: rgba(246,239,225,.5);
      font-size: .82rem;
      letter-spacing: .04em;
    }
    .nf-foot a { color: var(--gold-2); border-bottom: 1px solid currentColor; }
    .nf-fish {
      position: absolute;
      width: 100px; opacity: .12;
      color: var(--gold);
      animation: nfSwim 28s linear infinite;
    }
    .nf-fish-1 { top: 14%; left: -120px; animation-duration: 24s; }
    .nf-fish-2 { top: 78%; left: -200px; animation-duration: 32s; animation-delay: -10s; width: 70px; }
    @keyframes nfSwim {
      from { transform: translateX(0); }
      to   { transform: translateX(calc(100vw + 240px)); }
    }
  </style>
</head>
<body class="nf">

  <div class="nf-bg" aria-hidden="true"></div>
  <svg class="nf-fish nf-fish-1" viewBox="0 0 100 40" aria-hidden="true">
    <path d="M70 20 C 70 5, 40 5, 25 20 C 40 35, 70 35, 70 20 Z M70 20 L95 5 L90 20 L95 35 Z M35 18 a2 2 0 1 1 -.1 0" fill="currentColor"/>
  </svg>
  <svg class="nf-fish nf-fish-2" viewBox="0 0 100 40" aria-hidden="true">
    <path d="M70 20 C 70 5, 40 5, 25 20 C 40 35, 70 35, 70 20 Z M70 20 L95 5 L90 20 L95 35 Z M35 18 a2 2 0 1 1 -.1 0" fill="currentColor"/>
  </svg>

  <div class="nf-card">
    <p class="nf-tag">№ 404 · Sayfa bulunamadı</p>
    <p class="nf-num">404</p>
    <h1>Bu sofra <em>kurulmamış.</em></h1>
    <p>Aradığınız sayfa burada değil — belki taşıdık, belki silindi, belki adres yanlış yazıldı. Sizi sahile geri götürelim.</p>

    <div class="nf-actions">
      <a href="index.html" class="btn btn-gold">Ana sayfaya dön</a>
      <a href="menu.html" class="btn btn-line">Menüyü aç</a>
      <a href="tel:+905327985244" class="btn btn-line">Telefon et</a>
    </div>

    <div class="nf-foot">
      Zafer Balıkçılık Artur · Karaağaç, Balıkesir ·
      <a href="https://wa.me/905327985244" target="_blank" rel="noopener">WhatsApp ile yaz</a>
    </div>
  </div>

</body>
</html>
