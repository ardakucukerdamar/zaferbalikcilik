  <style>
    body.galeri-page { background: var(--paper); }

    .gp-hero {
      padding: 90px 0 50px;
      text-align: left;
      background: var(--paper-2);
      border-bottom: 1px solid var(--line);
    }
    .gp-back {
      display: inline-flex; align-items: center; gap: 8px;

      letter-spacing: .12em;
      text-transform: uppercase;

      padding: 8px 14px;
      border-radius: 999px;
      background: var(--paper);
      border: 1px solid var(--line);

    .gp-back:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    .gp-hero h1 {
      font-family: var(--display);
      font-weight: 900;
      font-size: clamp(2.6rem, 7vw, 5.4rem);
      line-height: 1.02;
      letter-spacing: -.025em;
      margin: 0 0 16px;
    }
    .gp-hero h1 em { color: var(--bronze); font-style: italic; }
    .gp-hero p { color: var(--ink-soft); max-width: 580px; font-size: 1rem; }

    .gp-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 30px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }
    .gp-tab {
      padding: 9px 18px;
      font-size: .85rem;
      font-weight: 500;
      color: var(--ink-soft);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 999px;
      transition: background .25s ease, color .25s ease, border-color .25s ease;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .gp-tab i {
      font-style: normal;
      font-size: .72rem;
      color: var(--gold-deep);
      font-weight: 600;
    }
    .gp-tab:hover { color: var(--ink); }
    .gp-tab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .gp-tab.active i { color: var(--gold); }

    .gp-board { padding: 60px 0 100px; }
    .gp-grid {
      column-count: 4;
      column-gap: 16px;
    }
    .gp-grid figure {
      break-inside: avoid;
      margin: 0 0 16px;
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      cursor: zoom-in;
      transition: transform .35s var(--ease), opacity .35s ease;
    }
    .gp-grid figure.hidden { display: none; }
    .gp-grid figure img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform .6s var(--ease-out);
    }
    .gp-grid figure:hover img { transform: scale(1.04); }
    .gp-grid figure::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 45%, rgba(10,20,29,.78));
      opacity: 0;
      transition: opacity .35s ease;
    }
    .gp-grid figure:hover::after { opacity: 1; }
    .gp-grid figcaption {
      position: absolute;
      left: 16px; bottom: 14px;
      z-index: 2;
      color: var(--paper);
      font-family: var(--display);
      font-style: italic;
      font-size: .98rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .35s ease, transform .35s var(--ease);
    }
    .gp-grid figure:hover figcaption { opacity: 1; transform: none; }

    .gp-empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--ink-soft);
      font-style: italic;
      font-family: var(--display);
      font-size: 1.2rem;
      display: none;
    }
    .gp-empty.show { display: block; }

    .gp-foot {
      padding: 50px 0 80px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
      color: var(--ink-soft);
      font-size: .88rem;
    }
    .gp-foot strong { color: var(--ink-deep); font-family: var(--display); }
    .gp-foot a {
      color: var(--ink);
      border-bottom: 1px solid var(--gold-deep);
      padding-bottom: 2px;
    }
    .gp-foot a:hover { color: var(--gold-deep); }

    @media (max-width: 980px) { .gp-grid { column-count: 3; } }
    @media (max-width: 720px) { .gp-grid { column-count: 2; column-gap: 10px; } .gp-grid figure { margin-bottom: 10px; } }
    @media (max-width: 480px) { .gp-grid { column-count: 1; } }

  <!-- Lightbox (shared style) -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lb-close" aria-label="Kapat">
      <svg width="22" height="22" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
    <button class="lb-prev" aria-label="Önceki">‹</button>
    <figure class="lb-figure">
      <img id="lbImg" alt=""/>
      <figcaption>
        <span id="lbCap"></span>
        <span class="lb-counter"><i id="lbIdx">1</i> / <i id="lbTotal">16</i></span>
      </figcaption>
    </figure>
    <button class="lb-next" aria-label="Sonraki">›</button>
  </div>

  <script>
  (() => {
    const $ = (s, c = document) => c.querySelector(s);
    const $$ = (s, c = document) => Array.from(c.querySelectorAll(s));

    // Tabs filter
    const tabs = $$('.gp-tab');
    const figs = $$('.gp-grid figure');
    const empty = $('#gpEmpty');
    tabs.forEach(t => t.addEventListener('click', () => {
      tabs.forEach(x => x.classList.toggle('active', x === t));
      const tab = t.dataset.tab;
      let shown = 0;
      figs.forEach(f => {
        const ok = tab === 'all' || f.dataset.cat === tab;
        f.classList.toggle('hidden', !ok);
        if (ok) shown++;
      });
      empty.classList.toggle('show', shown === 0);
    }));

    // Lightbox
    const lb = $('#lightbox');
    const lbImg = $('#lbImg'), lbCap = $('#lbCap'), lbIdx = $('#lbIdx'), lbTot = $('#lbTotal');
    let idx = 0;
    const set = i => {
      const visible = figs.filter(f => !f.classList.contains('hidden'));
      if (!visible.length) return;
      idx = (i + visible.length) % visible.length;
      const t = visible[idx];
      lbImg.src = t.dataset.img;
      lbImg.alt = t.querySelector('figcaption')?.textContent || '';
      lbCap.textContent = t.querySelector('figcaption')?.textContent || '';
      lbIdx.textContent = String(idx + 1);
      lbTot.textContent = String(visible.length);
    };
    const open = i => {
      set(i);
      lb.classList.add('open');
      lb.setAttribute('aria-hidden', 'false');
      document.body.classList.add('no-scroll');
    };
    const close = () => {
      lb.classList.remove('open');
      lb.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('no-scroll');
    };
    figs.forEach((f, i) => f.addEventListener('click', () => {
      const visible = figs.filter(x => !x.classList.contains('hidden'));
      const j = visible.indexOf(f);
      open(j < 0 ? 0 : j);
    }));
    $('.lb-close', lb).addEventListener('click', close);
    $('.lb-prev', lb).addEventListener('click', () => set(idx - 1));
    $('.lb-next', lb).addEventListener('click', () => set(idx + 1));
    lb.addEventListener('click', e => { if (e.target === lb) close(); });
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') close();
      if (e.key === 'ArrowLeft') set(idx - 1);
      if (e.key === 'ArrowRight') set(idx + 1);
    });

    // SW
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  })();
  </script>
